jobs:
  api-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: warehouse_database
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Copy CI env
        working-directory: backend
        run: cp .env.ci .env

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" && break
            sleep 2
          done

      - name: Initialize database
        working-directory: backend
        run: mysql -h 127.0.0.1 -u root -proot warehouse_database < warehouse_database.sql

      - name: Start backend
        working-directory: backend
        run: |
          npm start &
          npx wait-on http://localhost:5000

      - name: Run Postman tests
        run: npx newman run postman/articles-test.json